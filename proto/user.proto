syntax = "proto3";

package pb;

import "google/protobuf/timestamp.proto";

option go_package = "simplebank/pb";

message User {
  string first_name = 1;
  string first_surname = 2;
  string second_surname = 3;
  string email = 4;
  int32 nationality = 5;
  google.protobuf.Timestamp created_at = 6;
}